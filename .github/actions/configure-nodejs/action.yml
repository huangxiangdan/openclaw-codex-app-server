name: "Configure Node.js"
description: "Install Node.js and restore cached dependencies when available"

inputs:
  node-version:
    description: "Node.js version"
    default: "22"
  lookup-only:
    description: "If true, only checks whether a cache entry exists without downloading it"
    default: "false"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Activate pnpm
      shell: bash
      run: corepack prepare pnpm@10.29.3 --activate

    - name: Restore node_modules from cache
      id: cache-node-modules
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          !node_modules/.cache
        key: node-modules-${{ inputs.node-version }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
        lookup-only: ${{ inputs.lookup-only }}

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
